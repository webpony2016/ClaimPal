<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClaimPal Operations Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-950">
    <div class="min-h-screen">
      <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
        <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-3 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-lg font-semibold text-slate-950">ClaimPal Operations Review</h1>
            <p class="text-xs text-slate-500">Human-in-the-loop settlement publishing</p>
          </div>
          <div
            id="pendingBadge"
            class="rounded-full bg-emerald-50 px-3 py-1 text-sm font-semibold text-emerald-700"
          >
            Pending Review List: 0 items left
          </div>
        </div>
      </header>

      <main class="mx-auto grid max-w-7xl gap-4 px-4 py-4 lg:grid-cols-2">
        <section class="min-h-[calc(100vh-112px)] rounded border border-slate-200 bg-white shadow-sm">
          <div class="border-b border-slate-200 p-4">
            <div class="flex items-center justify-between gap-4">
              <div>
                <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-700">Raw Source Data</h2>
                <p id="rawMeta" class="mt-1 text-xs text-slate-500">Waiting for a pending settlement...</p>
              </div>
              <a
                id="sourceLink"
                href="#"
                target="_blank"
                rel="noreferrer"
                class="hidden text-sm font-semibold text-blue-800 hover:text-blue-950"
              >
                Open original source
              </a>
            </div>
            <div
              id="sourceUrl"
              class="mt-3 hidden truncate rounded border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-600"
            ></div>
          </div>
          <pre
            id="rawContent"
            class="h-[calc(100vh-210px)] overflow-auto whitespace-pre-wrap bg-slate-950 p-4 text-sm leading-6 text-slate-100"
          >No pending settlements.</pre>
        </section>

        <section class="min-h-[calc(100vh-112px)] rounded border border-slate-200 bg-white shadow-sm">
          <form id="reviewForm" class="flex min-h-[calc(100vh-112px)] flex-col">
            <div class="space-y-4 p-4">
              <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div>
                  <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-700">AI Sanitized Form</h2>
                  <p class="mt-1 text-xs text-slate-500">Review, correct, then publish or reject.</p>
                </div>
              </div>

              <div class="grid gap-4 md:grid-cols-2">
                <label class="block text-sm font-medium text-slate-700">
                  Brand/Company Name
                  <input
                    id="brandName"
                    name="brand_name"
                    required
                    class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100"
                  />
                  <p id="brand_nameError" class="mt-1 hidden text-xs text-red-600"></p>
                </label>

                <label class="block text-sm font-medium text-slate-700">
                  Maximum Estimated Payout
                  <input
                    id="maxPayout"
                    name="max_payout"
                    type="number"
                    step="0.01"
                    min="0"
                    class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100"
                  />
                  <p id="max_payoutError" class="mt-1 hidden text-xs text-red-600"></p>
                </label>

                <label class="block text-sm font-medium text-slate-700">
                  Country
                  <select
                    id="country"
                    name="country"
                    required
                    class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100"
                  >
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                  </select>
                  <p id="countryError" class="mt-1 hidden text-xs text-red-600"></p>
                </label>

                <label class="block text-sm font-medium text-slate-700">
                  Final Deadline
                  <input
                    id="deadline"
                    name="deadline"
                    type="date"
                    class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100"
                  />
                  <p id="deadlineError" class="mt-1 hidden text-xs text-red-600"></p>
                </label>
              </div>

              <label class="flex items-center gap-3 text-sm font-medium text-slate-700">
                <input
                  id="proofRequired"
                  name="proof_required"
                  type="checkbox"
                  class="h-5 w-5 rounded border-slate-300 text-emerald-700 focus:ring-emerald-200"
                />
                Proof Required
              </label>

              <label class="block text-sm font-medium text-slate-700">
                Eligibility Criteria Summary
                <textarea
                  id="eligibilityText"
                  name="eligibility_text"
                  rows="10"
                  class="mt-1 w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100"
                ></textarea>
                <p id="eligibility_textError" class="mt-1 hidden text-xs text-red-600"></p>
              </label>

              <div id="message" class="hidden rounded border px-3 py-2 text-sm"></div>
            </div>

            <div class="sticky bottom-0 mt-auto grid gap-3 border-t border-slate-200 bg-white p-4 sm:grid-cols-2">
              <button
                id="approveButton"
                type="submit"
                class="rounded bg-emerald-700 px-4 py-3 text-sm font-semibold text-white transition hover:bg-emerald-800 disabled:cursor-not-allowed disabled:opacity-60"
              >
                Approve &amp; Publish
              </button>
              <button
                id="rejectButton"
                type="button"
                class="rounded bg-red-700 px-4 py-3 text-sm font-semibold text-white transition hover:bg-red-800 disabled:cursor-not-allowed disabled:opacity-60"
              >
                Reject / Spam
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="/static/admin.js"></script>
  </body>
</html>
